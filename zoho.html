<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRS Code Lookup — FIRS E-Invoicing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a1f;
    --surface-2: #1e2329;
    --surface-3: #252b33;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #e8eaed;
    --text-secondary: #8b929e;
    --text-muted: #555d6b;
    --accent: #00c896;
    --accent-dim: rgba(0,200,150,0.12);
    --accent-glow: rgba(0,200,150,0.25);
    --blue: #4d9fff;
    --blue-dim: rgba(77,159,255,0.1);
    --danger: #ff6b6b;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo-area { display: flex; align-items: center; gap: 12px; }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 18px; height: 18px; }

  .logo-text h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-primary);
  }

  .logo-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .header-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 20px;
    border: 1px solid var(--accent-glow);
    letter-spacing: 0.3px;
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 28px 24px 48px;
    gap: 20px;
  }

  /* ── Tab switcher ── */
  .tab-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 4px;
    gap: 4px;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--text-primary); background: var(--surface-2); }

  .tab-btn.active {
    background: var(--surface-3);
    color: var(--text-primary);
    border: 1px solid var(--border-hover);
  }

  .tab-btn.active .tab-dot { background: var(--accent); }

  .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.18s;
  }

  .tab-count {
    font-size: 11px;
    padding: 2px 7px;
    background: var(--surface-3);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .tab-btn.active .tab-count { background: var(--accent-dim); color: var(--accent); }

  /* ── Search ── */
  .search-wrap { position: relative; }

  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 13px 44px 13px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search::placeholder { color: var(--text-muted); }

  #search:focus { border-color: var(--border-hover); }

  .clear-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    background: var(--surface-3);
    border: none;
    border-radius: 50%;
    color: var(--text-muted);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    transition: all 0.15s;
  }

  .clear-btn:hover { background: var(--border-hover); color: var(--text-primary); }
  .clear-btn.visible { display: flex; }

  /* ── Meta bar ── */
  .meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
  }

  .meta-bar span { transition: color 0.15s; }
  .meta-bar span.has-results { color: var(--text-secondary); }

  .hint {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Results list ── */
  .results-container {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    cursor: default;
  }

  .result-row:last-child { border-bottom: none; }
  .result-row:hover { background: var(--surface-2); }

  .code-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 9px;
    background: var(--blue-dim);
    color: var(--blue);
    border-radius: 6px;
    white-space: nowrap;
    min-width: 72px;
    text-align: center;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  .result-desc {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.45;
  }

  .result-desc em {
    font-style: normal;
    color: var(--accent);
    font-weight: 500;
  }

  .copy-btn {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    opacity: 0;
  }

  .result-row:hover .copy-btn { opacity: 1; }

  .copy-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent-glow);
    color: var(--accent);
  }

  .copy-btn.copied {
    opacity: 1;
    background: var(--accent-dim);
    border-color: var(--accent-glow);
    color: var(--accent);
  }

  /* ── States ── */
  .state-box {
    padding: 48px 24px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .state-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }

  .state-icon.loading { background: var(--accent-dim); animation: pulse 1.4s ease-in-out infinite; }
  .state-icon.empty { background: var(--surface-3); }
  .state-icon.error { background: rgba(255,107,107,0.1); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .state-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .state-sub { font-size: 12px; color: var(--text-muted); max-width: 260px; line-height: 1.5; }

  /* ── Footer note ── */
  .footer-note {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding-top: 4px;
    line-height: 1.6;
  }

  .footer-note a { color: var(--text-secondary); text-decoration: none; }
  .footer-note a:hover { color: var(--text-primary); }

  /* ── Scrollbar ── */
  .results-container { max-height: 520px; overflow-y: auto; }

  .results-container::-webkit-scrollbar { width: 6px; }
  .results-container::-webkit-scrollbar-track { background: transparent; }
  .results-container::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
  .results-container::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* ── Responsive ── */
  @media (max-width: 540px) {
    header { padding: 18px 16px; }
    main { padding: 20px 14px 40px; }
    .tab-btn { font-size: 12px; padding: 9px 10px; gap: 6px; }
    .tab-count { display: none; }
    .result-row { padding: 10px 12px; gap: 10px; }
    .copy-btn { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="6" height="6" rx="1.5" fill="#00c896" opacity="0.9"/>
        <rect x="10" y="2" width="6" height="6" rx="1.5" fill="#00c896" opacity="0.5"/>
        <rect x="2" y="10" width="6" height="6" rx="1.5" fill="#00c896" opacity="0.5"/>
        <rect x="10" y="10" width="6" height="6" rx="1.5" fill="#00c896" opacity="0.3"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>NRS HSN/Service Code Lookup</h1>
      <p>NRS e-Invoice Reference</p>
    </div>
  </div>
  <span class="header-badge">v1.4 Compliant</span>
</header>

<main>

  <div class="tab-group" role="tablist">
    <button class="tab-btn active" role="tab" onclick="switchTab('hs')" id="tab-hs">
      <span class="tab-dot"></span>
      HS Codes
      <span class="tab-count" id="hs-count">—</span>
    </button>
    <button class="tab-btn" role="tab" onclick="switchTab('svc')" id="tab-svc">
      <span class="tab-dot"></span>
      Service Codes
      <span class="tab-count" id="svc-count">—</span>
    </button>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <input type="text" id="search" placeholder="Search by keyword or code…" autocomplete="off" oninput="onSearch()" />
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()" title="Clear search">✕</button>
  </div>

  <div class="meta-bar">
    <span id="result-count">Type to search, or scroll to browse</span>
    <span class="hint">Click Copy to grab a code</span>
  </div>

  <div class="results-container" id="results">
    <div class="state-box">
      <div class="state-icon loading">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7" stroke="#00c896" stroke-width="1.5" stroke-dasharray="22 22" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 9 9" to="360 9 9" dur="0.9s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </div>
      <p class="state-title">Fetching codes from NRS…</p>
      <p class="state-sub">Loading HS codes and service codes</p>
    </div>
  </div>

  <p class="footer-note">
    Data sourced live from NRS &middot; Use <strong>HS Codes</strong> for physical goods &middot; Use <strong>Service Codes</strong> when <code>is_service = true</code>
  </p>

</main>

<script>
  let hsData = [];
  let svcData = [];
  let activeTab = 'hs';
  let searchTimer = null;

  async function loadData() {
    try {
      const [hsRes, svcRes] = await Promise.all([
        fetch('https://eivc-k6z6d.ondigitalocean.app/api/v1/invoice/resources/hs-codes'),
        fetch('https://eivc-k6z6d.ondigitalocean.app/api/v1/invoice/resources/services-codes')
      ]);
      const hsJson = await hsRes.json();
      const svcJson = await svcRes.json();
      hsData = hsJson.data || [];
      svcData = svcJson.data || [];
      document.getElementById('hs-count').textContent = hsData.length.toLocaleString();
      document.getElementById('svc-count').textContent = svcData.length.toLocaleString();
      renderList();
    } catch(e) {
      document.getElementById('results').innerHTML = `
        <div class="state-box">
          <div class="state-icon error">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="9" r="7" stroke="#ff6b6b" stroke-width="1.5"/>
              <path d="M9 5.5V9.5" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="9" cy="12" r="0.8" fill="#ff6b6b"/>
            </svg>
          </div>
          <p class="state-title">Failed to load codes</p>
          <p class="state-sub">Check your internet connection and reload the page</p>
        </div>`;
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-hs').classList.toggle('active', tab === 'hs');
    document.getElementById('tab-svc').classList.toggle('active', tab === 'svc');
    clearSearch(false);
    renderList();
  }

  function onSearch() {
    const val = document.getElementById('search').value;
    document.getElementById('clear-btn').classList.toggle('visible', val.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderList, 160);
  }

  function clearSearch(doRender = true) {
    document.getElementById('search').value = '';
    document.getElementById('clear-btn').classList.remove('visible');
    if (doRender) renderList();
  }

  function highlight(text, query) {
    if (!query) return text;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${escaped})`, 'gi'), '<em>$1</em>');
  }

  function renderList() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const data = activeTab === 'hs' ? hsData : svcData;
    const codeKey = activeTab === 'hs' ? 'hscode' : 'code';

    if (!data.length) return;

    let filtered;
    if (q) {
      filtered = data.filter(d =>
        d.description.toLowerCase().includes(q) ||
        d[codeKey].toLowerCase().includes(q)
      );
    } else {
      filtered = data.slice(0, 120);
    }

    const countEl = document.getElementById('result-count');
    if (q) {
      countEl.textContent = filtered.length
        ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${q}"`
        : `No results for "${q}"`;
      countEl.className = filtered.length ? 'has-results' : '';
    } else {
      countEl.textContent = `Showing first 120 of ${data.length.toLocaleString()} — type to search all`;
      countEl.className = '';
    }

    if (!filtered.length) {
      document.getElementById('results').innerHTML = `
        <div class="state-box">
          <div class="state-icon empty">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="9" r="7" stroke="#555d6b" stroke-width="1.5"/>
              <path d="M6 9h6" stroke="#555d6b" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="state-title">No codes found</p>
          <p class="state-sub">Try different keywords or check the other tab</p>
        </div>`;
      return;
    }

    const show = q ? filtered : filtered;
    document.getElementById('results').innerHTML = show.map(d => {
      const code = d[codeKey];
      const desc = highlight(d.description, q);
      const codeDisp = highlight(code, q);
      return `<div class="result-row">
        <span class="code-pill">${codeDisp}</span>
        <span class="result-desc">${desc}</span>
        <button class="copy-btn" onclick="copyCode('${code}', this)">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <rect x="3.5" y="3.5" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
            <path d="M1.5 7.5V1.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Copy
        </button>
      </div>`;
    }).join('');
  }

  function copyCode(code, btn) {
    navigator.clipboard.writeText(code).then(() => {
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied`;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="3.5" y="3.5" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 7.5V1.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Copy`;
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = code;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  loadData();
</script>
</body>
</html>
