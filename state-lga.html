<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRS State & LGA Lookup — FIRS E-Invoicing</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Zoho Signature Palette */
            --zoho-red: #F0483E;
            --zoho-blue: #0070D2;
            --zoho-green: #2DB47D;
            --zoho-yellow: #F7B500;

            /* Theme Colors */
            --bg: #0b0e14;
            --surface: #151921;
            --surface-2: #1c222d;
            --surface-3: #242b38;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.16);

            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --accent: var(--zoho-blue);
            --accent-dim: rgba(0, 112, 210, 0.15);
            --accent-glow: rgba(0, 112, 210, 0.3);

            --blue: #38bdf8;
            --blue-dim: rgba(56, 189, 248, 0.1);
            --orange: var(--zoho-yellow);
            --orange-dim: rgba(247, 181, 0, 0.1);
            --radius: 8px;
            --radius-lg: 12px;
        }

        /* ... General Reset & Body ... */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }

        /* ── Header ── */
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            position: sticky; top: 0; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(12px); z-index: 10;
        }

        .logo-area { display: flex; align-items: center; gap: 14px; }
        .logo-mark {
            width: 38px; height: 38px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 2px;
        }
        .logo-mark span { border-radius: 2px; }
        .logo-mark .sq-1 { background: var(--zoho-red); }
        .logo-mark .sq-2 { background: var(--zoho-blue); }
        .logo-mark .sq-3 { background: var(--zoho-green); }
        .logo-mark .sq-4 { background: var(--zoho-yellow); }

        .logo-text h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
        .logo-text p { font-size: 12px; color: var(--text-muted); }
        .header-badge {
            font-size: 11px; font-weight: 600; padding: 4px 12px;
            background: var(--accent-dim); color: var(--accent);
            border-radius: 4px; border: 1px solid var(--accent-glow);
        }

        /* ── Steps ── */
        .steps { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); }
        .step-num {
            width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border-hover);
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700;
        }
        .step.active .step-num { background: var(--zoho-blue); border-color: var(--zoho-blue); color: #fff; }
        .step.done .step-num { background: var(--zoho-green); border-color: var(--zoho-green); color: #fff; }
        .step.active .step-label { color: var(--text-primary); font-weight: 600; }

        /* ── State Selector & Grid ── */
        .state-btn {
            background: var(--surface); color: var(--text-secondary);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 10px 12px; transition: all 0.2s;
        }
        .state-btn:hover { background: var(--surface-2); border-color: var(--zoho-blue); color: #fff; }
        .state-btn.selected { background: var(--accent-dim); border-color: var(--zoho-blue); color: var(--zoho-blue); }

        /* ── Copy Bar ── */
        .state-code-bar {
            background: var(--surface); border: 1px solid var(--accent-glow);
            border-radius: var(--radius); padding: 12px 18px;
        }
        .scb-code { color: var(--zoho-blue); font-weight: 700; font-size: 14px; }
        .scb-copy {
            background: var(--zoho-blue); color: #fff; border: none;
            padding: 6px 14px; border-radius: 4px; font-weight: 600;
        }
        .scb-copy.copied { background: var(--zoho-green); }

        /* ── LGA List & Search ── */
        #lga-search:focus { border-color: var(--zoho-blue); box-shadow: 0 0 0 3px var(--accent-dim); }
        .lga-code { background: var(--orange-dim); color: var(--zoho-yellow); font-weight: 700; border-radius: 4px; }
        .lga-row:hover { background: var(--surface-2); }
        .lga-name em { color: var(--zoho-green); font-weight: 600; background: rgba(45, 180, 125, 0.1); }

        .copy-btn:hover, .copy-btn.copied { background: var(--zoho-blue); color: #fff; border-color: var(--zoho-blue); opacity: 1; }
        .copy-btn.copied { background: var(--zoho-green); border-color: var(--zoho-green); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-mark">
            <span class="sq-1"></span>
            <span class="sq-2"></span>
            <span class="sq-3"></span>
            <span class="sq-4"></span>
        </div>
        <div class="logo-text">
            <h1>State & LGA Lookup</h1>
            <p>NRS e-Invoice Reference</p>
        </div>
    </div>
    <span class="header-badge">v1.4 Compliant</span>
</header>

<main>
    <div class="steps">
        <div class="step active" id="step1">
            <span class="step-num">1</span>
            <span class="step-label">Select State</span>
        </div>
        <span class="step-arrow">›</span>
        <div class="step" id="step2">
            <span class="step-num">2</span>
            <span class="step-label">Copy State Code</span>
        </div>
        <span class="step-arrow">›</span>
        <div class="step" id="step3">
            <span class="step-num">3</span>
            <span class="step-label">Find & Copy LGA Code</span>
        </div>
    </div>

</main>

<script>
    let allStates = [];
    let allLGAs = [];
    let selectedState = null;

    async function loadData() {
        try {
            const [statesRes, lgasRes] = await Promise.all([
                fetch('https://eivc-k6z6d.ondigitalocean.app/api/v1/invoice/resources/states'),
                fetch('https://eivc-k6z6d.ondigitalocean.app/api/v1/invoice/resources/lgas')
            ]);
            const statesJson = await statesRes.json();
            const lgasJson = await lgasRes.json();
            allStates = statesJson.data || [];
            allLGAs = lgasJson.data || [];
            renderStates();
        } catch(e) {
            document.getElementById('state-grid').innerHTML = `<div class="state-box"><p class="state-title" style="color:var(--danger)">Failed to load. Check connection.</p></div>`;
        }
    }

    function renderStates() {
        document.getElementById('state-grid').innerHTML = allStates.map(s => `
      <button class="state-btn ${selectedState && selectedState.code === s.code ? 'selected' : ''}"
        onclick="selectState('${s.code}', '${s.name.replace(/'/g,"\\'")}')">
        <span>${s.name}</span>
        <span class="sc">${s.code.replace('NG-','')}</span>
      </button>
    `).join('');
    }

    function selectState(code, name) {
        selectedState = { code, name };

        // Update grid selection
        document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('selected'));
        event.currentTarget.classList.add('selected');

        // Show state code bar
        document.getElementById('selected-state-name').textContent = name;
        document.getElementById('selected-state-code').textContent = code;
        document.getElementById('state-code-bar').classList.add('visible');

        // Update steps
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step1').classList.add('done');
        document.getElementById('step2').classList.add('active');

        // Show LGA section
        document.getElementById('lga-section-title').textContent = name;
        document.getElementById('lga-section').classList.add('visible');
        document.getElementById('lga-search').value = '';
        document.getElementById('clear-btn').classList.remove('visible');
        renderLGAs('');
    }

    function renderLGAs(q) {
        if (!selectedState) return;
        const stateLGAs = allLGAs.filter(l => l.state_code === selectedState.code);
        const filtered = q ? stateLGAs.filter(l => l.name.toLowerCase().includes(q)) : stateLGAs;

        document.getElementById('lga-count').textContent = q
            ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${q}"`
            : `${filtered.length} LGA${filtered.length !== 1 ? 's' : ''} in ${selectedState.name}`;

        if (!filtered.length) {
            document.getElementById('lga-list').innerHTML = `<div class="state-box"><div class="state-icon empty"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#555d6b" stroke-width="1.4"/><path d="M5 8h6" stroke="#555d6b" stroke-width="1.4" stroke-linecap="round"/></svg></div><p class="state-title">No LGAs found</p></div>`;
            return;
        }

        document.getElementById('lga-list').innerHTML = filtered.map(l => {
            const name = q ? l.name.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<em>$1</em>') : l.name;
            return `<div class="lga-row">
        <span class="lga-code">${l.code}</span>
        <span class="lga-name">${name}</span>
        <button class="copy-btn" onclick="copyLGACode('${l.code}', this)">
          <svg width="10" height="10" viewBox="0 0 11 11" fill="none"><rect x="3.5" y="3.5" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 7.5V1.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Copy
        </button>
      </div>`;
        }).join('');
    }

    function onLGASearch() {
        const val = document.getElementById('lga-search').value;
        document.getElementById('clear-btn').classList.toggle('visible', val.length > 0);
        renderLGAs(val.trim().toLowerCase());
    }

    function clearLGASearch() {
        document.getElementById('lga-search').value = '';
        document.getElementById('clear-btn').classList.remove('visible');
        renderLGAs('');
    }

    function copyStateCode() {
        const code = selectedState ? selectedState.code : '';
        navigator.clipboard.writeText(code).then(() => {
            const btn = document.getElementById('copy-state-btn');
            btn.textContent = '✓ Copied!';
            btn.classList.add('copied');
            // Mark step 2 done, activate step 3
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step2').classList.add('done');
            document.getElementById('step3').classList.add('active');
            setTimeout(() => { btn.textContent = 'Copy State Code'; btn.classList.remove('copied'); }, 2000);
        });
    }

    function copyLGACode(code, btn) {
        navigator.clipboard.writeText(code).then(() => {
            btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied`;
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 11 11" fill="none"><rect x="3.5" y="3.5" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 7.5V1.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Copy`;
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    loadData();
</script>
</body>
</html>
